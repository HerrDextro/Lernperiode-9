services:
  cloud.api:
    image: ${DOCKER_REGISTRY-}cloudapi
    build:
      context: .
      dockerfile: cloud.api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Mongo={ConnectionStrings__Mongo}
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS}
    volumes:
      - cloud_data:/data/db

volumes:
  cloud_data:
  

